name: Update Playwright Snapshots
run-name: Update visual regression baselines
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to update snapshots on
        required: true
        default: feat/visual-regression-tests
jobs:
  update-snapshots:
    name: Regenerate Linux snapshots
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Update snapshots
        run: npx playwright test --grep "Visual regression" --update-snapshots

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pw-tests/**-snapshots/
          git diff --staged --quiet || git commit -m "chore: update Playwright visual regression snapshots [skip ci]"
          git push
