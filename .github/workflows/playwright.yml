name: Playwright Tests
run-name: E2E Tests
on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
jobs:
  playwright:
    name: "Playwright shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4.0.1
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=blob

      - name: Upload blob report
        uses: actions/upload-artifact@v4.3.0
        if: always()
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge Playwright reports
    needs: playwright
    runs-on: ubuntu-24.04
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4.0.1
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4.3.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  all-tests-passed:
    name: All Playwright tests passed
    needs: playwright
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - run: echo "All shards completed successfully"
