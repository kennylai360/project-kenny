<!--TODO: Maybe can rewrite this to check the isModalOpen$ using if and angular animations to adjust the fade-in and out-->
<div
  [ngClass]="{
    'show-overlay-background': (isModalOpen$ | async) === true,
    'hide-overlay-background': (isModalOpen$ | async) === false,
  }"
>
  <!--Modal Navigations controls -->
  <!-- <i class="fa fa-times modal-close" aria-hidden="true" (click)="closeModal()">
  </i> -->
  <fa-icon
    class="modal-close"
    [icon]="icons.closeModalButton"
    (click)="closeModal()"
  />
  @if (currentIndex > 0) {
    <fa-icon
      class="modal-arrows left-arrow"
      [icon]="icons.leftArrow"
      (click)="navigateImage(-1)"
    />
  }
  @if (albumSet()?.length && currentIndex < albumSet().length - 1) {
    <fa-icon
      class="modal-arrows right-arrow"
      [icon]="icons.rightArrow"
      (click)="navigateImage(1)"
    />
  }

  @if (displayImageUrl) {
    <img
      alt="loaded image"
      class="modal-image"
      [@slideAnimation]="currentIndex"
      [ngSrc]="displayImageUrl"
      [ngClass]="{
        'horizontal-image': displayHorizontalOrientation,
        'vertical-image': !displayHorizontalOrientation,
      }"
    />
  }
</div>
